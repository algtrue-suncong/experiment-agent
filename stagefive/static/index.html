<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>智能出行助手 Gateway</title>
  <style>
    :root {
      --bg: #0f1419;
      --panel: #1a2332;
      --text: #e7ecf3;
      --muted: #8b98a8;
      --accent: #3b82f6;
      --user: #2563eb;
      --bot: #334155;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; font-family: ui-sans-serif, system-ui, sans-serif;
      background: radial-gradient(1200px 600px at 20% -10%, #1e3a5f 0%, transparent 55%), var(--bg);
      color: var(--text);
    }
    .wrap { max-width: 720px; margin: 0 auto; padding: 24px 16px 100px; min-width: 0; }
    h1 { font-size: 1.25rem; font-weight: 600; margin: 0 0 8px; }
    .sub { color: var(--muted); font-size: 0.875rem; margin-bottom: 20px; }
    .session { margin-bottom: 16px; max-width: 100%; min-width: 0; }
    .session-label {
      font-size: 0.75rem; color: var(--muted); margin-bottom: 6px;
    }
    .session-id {
      display: block;
      max-width: 100%;
      font-size: 0.7rem;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      color: var(--text);
      background: rgba(0, 0, 0, 0.22);
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 8px 10px;
      line-height: 1.45;
      word-break: break-word;
      overflow-wrap: anywhere;
      white-space: pre-wrap;
    }
    #log {
      display: flex; flex-direction: column; gap: 12px;
      min-height: 200px;
    }
    .msg {
      padding: 12px 14px; border-radius: 12px; max-width: 100%; min-width: 0;
      white-space: pre-wrap; line-height: 1.5;
      word-break: break-word; overflow-wrap: anywhere;
    }
    .msg.user { align-self: flex-end; background: var(--user); color: #fff; }
    .msg.assistant { align-self: flex-start; background: var(--bot); border: 1px solid #475569; }
    .msg.err { align-self: stretch; background: #7f1d1d; border: 1px solid #b91c1c; color: #fecaca; }
    .composer {
      position: fixed; left: 0; right: 0; bottom: 0;
      padding: 12px 16px 20px;
      background: linear-gradient(transparent, rgba(15,20,25,0.95));
    }
    .composer-inner { max-width: 720px; margin: 0 auto; display: flex; gap: 8px; }
    textarea {
      flex: 1; resize: none; min-height: 44px; max-height: 160px;
      padding: 10px 12px; border-radius: 10px; border: 1px solid #334155;
      background: var(--panel); color: var(--text); font-size: 0.95rem;
    }
    input[type="text"], input[type="password"] {
      flex: 1; padding: 8px 10px; border-radius: 8px; border: 1px solid #334155;
      background: var(--panel); color: var(--text); font-size: 0.9rem;
    }
    button {
      padding: 0 18px; border-radius: 10px; border: none;
      background: var(--accent); color: #fff; font-weight: 600; cursor: pointer;
    }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .toolbar { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; align-items: center; }
    .toolbar button { background: #334155; font-weight: 500; font-size: 0.8rem; }
    .login-panel {
      background: var(--panel); border: 1px solid #334155; border-radius: 12px;
      padding: 14px; margin-bottom: 16px;
    }
    .login-row { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
    .badge { font-size: 0.75rem; color: var(--muted); }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>智能出行助手（Gateway）</h1>
    <p class="sub">短期记忆：最近 K 轮 + 会话状态 + 滚动摘要；工具原文在服务端审计目录。长期记忆见 data/memory/&lt;用户&gt;.md。</p>
    <div id="authPanel" class="login-panel" style="display:none;">
      <div class="badge">已启用登录（GATEWAY_USERS）</div>
      <div class="login-row">
        <input type="text" id="loginUser" placeholder="用户名" autocomplete="username" />
        <input type="password" id="loginPass" placeholder="密码" autocomplete="current-password" />
        <button type="button" id="btnLogin">登录</button>
      </div>
      <p class="badge" id="authHint"></p>
    </div>
    <div class="toolbar">
      <button type="button" id="btnNew">新会话</button>
      <button type="button" id="btnClearLog">仅清空显示</button>
      <button type="button" id="btnLogout" style="display:none;">退出登录</button>
      <span class="badge" id="userBadge"></span>
    </div>
    <div class="session">
      <div class="session-label">session_id</div>
      <div class="session-id" id="sid">（尚未建立）</div>
    </div>
    <div id="log"></div>
  </div>
  <div class="composer">
    <div class="composer-inner">
      <textarea id="input" rows="1" placeholder="输入消息，Enter 发送，Shift+Enter 换行"></textarea>
      <button type="button" id="send">发送</button>
    </div>
  </div>
  <script>
    const KEY = "didi_gateway_session_id";
    const TOKEN_KEY = "didi_gateway_token";
    const logEl = document.getElementById("log");
    const sidEl = document.getElementById("sid");
    const input = document.getElementById("input");
    const sendBtn = document.getElementById("send");
    const authPanel = document.getElementById("authPanel");
    const btnLogout = document.getElementById("btnLogout");
    const userBadge = document.getElementById("userBadge");
    const authHint = document.getElementById("authHint");

    let authRequired = false;

    function getSessionId() {
      return localStorage.getItem(KEY) || null;
    }
    function setSessionId(id) {
      if (id) localStorage.setItem(KEY, id);
      else localStorage.removeItem(KEY);
      sidEl.textContent = id || "（尚未建立）";
    }
    setSessionId(getSessionId());

    function getToken() {
      return localStorage.getItem(TOKEN_KEY) || null;
    }
    function setToken(t) {
      if (t) localStorage.setItem(TOKEN_KEY, t);
      else localStorage.removeItem(TOKEN_KEY);
    }

    function authHeaders() {
      const t = getToken();
      const h = { "Content-Type": "application/json" };
      if (t) h["Authorization"] = "Bearer " + t;
      return h;
    }

    async function refreshAuthUi() {
      try {
        const r = await fetch("/api/auth/status");
        const d = await r.json().catch(() => ({}));
        authRequired = !!d.auth_required;
        authPanel.style.display = authRequired ? "block" : "none";
        btnLogout.style.display = authRequired && getToken() ? "inline-block" : "none";
        if (authRequired && !getToken()) {
          authHint.textContent = "请先登录后再对话。";
          sendBtn.disabled = true;
        } else {
          authHint.textContent = "";
          sendBtn.disabled = false;
        }
        userBadge.textContent = authRequired && getToken() ? "已登录" : (authRequired ? "未登录" : "开发模式 guest");
      } catch (_) {
        authRequired = false;
        authPanel.style.display = "none";
      }
    }

    document.getElementById("btnLogin").addEventListener("click", async () => {
      const username = document.getElementById("loginUser").value.trim();
      const password = document.getElementById("loginPass").value;
      if (!username || !password) {
        authHint.textContent = "请输入用户名和密码";
        return;
      }
      try {
        const r = await fetch("/api/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password }),
        });
        const data = await r.json().catch(() => ({}));
        if (!r.ok) throw new Error(data.detail || r.statusText);
        setToken(data.access_token);
        authHint.textContent = "登录成功，用户：" + (data.user_id || username);
        sendBtn.disabled = false;
        btnLogout.style.display = "inline-block";
        userBadge.textContent = "已登录";
        setSessionId(null);
        logEl.innerHTML = "";
        appendMsg("assistant", "已登录，已开始新会话上下文。");
      } catch (e) {
        authHint.textContent = String(e.message || e);
      }
    });

    btnLogout.addEventListener("click", () => {
      setToken(null);
      setSessionId(null);
      logEl.innerHTML = "";
      refreshAuthUi();
      appendMsg("assistant", "已退出登录。");
    });

    function appendMsg(role, text, isErr) {
      const d = document.createElement("div");
      d.className = "msg " + (isErr ? "err" : role);
      d.textContent = text;
      logEl.appendChild(d);
      logEl.scrollTop = logEl.scrollHeight;
    }

    async function send() {
      const text = input.value.trim();
      if (!text) return;
      if (authRequired && !getToken()) {
        appendMsg("assistant", "请先登录。", true);
        return;
      }
      input.value = "";
      sendBtn.disabled = true;
      appendMsg("user", text);

      try {
        const r = await fetch("/api/chat", {
          method: "POST",
          headers: authHeaders(),
          body: JSON.stringify({ session_id: getSessionId(), message: text }),
        });
        const data = await r.json().catch(() => ({}));
        if (!r.ok) {
          const d = data.detail;
          const errText = typeof d === "string" ? d : (Array.isArray(d) ? d.map((x) => x.msg || x).join("; ") : JSON.stringify(d || data));
          throw new Error(errText || r.statusText);
        }
        if (data.session_id) setSessionId(data.session_id);
        appendMsg("assistant", data.reply || "");
      } catch (e) {
        appendMsg("assistant", String(e.message || e), true);
      } finally {
        sendBtn.disabled = false;
        input.focus();
      }
    }

    sendBtn.addEventListener("click", send);
    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        send();
      }
    });

    document.getElementById("btnNew").addEventListener("click", async () => {
      const old = getSessionId();
      if (old) {
        try {
          await fetch("/api/session/" + encodeURIComponent(old), { method: "DELETE", headers: authHeaders() });
        } catch (_) {}
      }
      setSessionId(null);
      logEl.innerHTML = "";
      appendMsg("assistant", "已开始新会话。");
    });

    document.getElementById("btnClearLog").addEventListener("click", () => {
      logEl.innerHTML = "";
    });

    refreshAuthUi();
  </script>
</body>
</html>
